ext {
    extName = 'Lgbtics'
    extClass = '.Lgbtics'
    extVersionCode = 1
    isNsfw = true
}

apply plugin: "kei.plugins.extension.legacy"

// Supplies the missing manifest values that the build system is hunting for
android {
    defaultConfig {
        manifestPlaceholders += [
            SOURCEHOST: "lgbtics.com",
            SOURCESCHEME: "https"
        ]
    }
}

dependencies {
    implementation(project(":lib-multisrc:madara"))
}

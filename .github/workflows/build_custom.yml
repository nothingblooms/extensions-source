name: Build My Custom Extension

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Extension
        run: |
          # We use the root gradlew. 
          # The repo's settings.gradle.kts already knows where :src:en:lgbtics is.
          # We just need to trigger the specific task.
          
          ./gradlew :src:en:lgbtics:assembleDebug \
            -x spotlessKotlinCheck \
            -x lintDebug \
            -x test \
            -x check \
            -x signRelease \
            -x packageRelease \
            --no-daemon
            
      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: lgbtics-extension-apk
          path: "../isolated_workspace/lgbtics/build/outputs/apk/debug/*.apk"

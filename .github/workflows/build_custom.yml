name: Build My Custom Extension

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
     
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            common
            core
            gradle
            lib
            lib-multisrc
            # DO NOT include src here

      - name: Setup Extension
        run: |
          # Manually create the path and pull ONLY your extension
          mkdir -p src/en/lgbtics
          # This assumes your repo has the files, we just 'git checkout' the specific folder
          git sparse-checkout add src/en/lgbtics

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: true
          cache-write-only: false
          gradle-home-cache-cleanup: false

      - name: Force Isolation
        run: |
          # This deletes every folder in src except your target extension
          # It prevents Gradle from finding and trying to build/sign other extensions
          find src -mindepth 2 -maxdepth 3 -not -path 'src/en/lgbtics*' -exec rm -rf {} +
          
          # Delete the signing key file so it cannot be used
          rm -f signingkey.jks

      - name: Build Extension
        run: |
          chmod +x gradlew
          # Now, because we only ever checked out YOUR extension, 
          # Gradle literally cannot see any other extensions to build/sign.
          ./gradlew :src:en:lgbtics:assembleDebug -x spotlessKotlinCheck
            -x lintDebug \
            -x test \
            -x check
          
      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: lgbtics-extension-apk
          path: "src/en/lgbtics/build/outputs/apk/debug/*.apk"

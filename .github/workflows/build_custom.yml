name: Build My Custom Extension

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            common
            core
            gradle
            lib
            lib-multisrc

      - name: Setup Extension
        run: |
          mkdir -p src/en/lgbtics
          git sparse-checkout add src/en/lgbtics

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: true
          cache-write-only: false
          gradle-home-cache-cleanup: false

      - name: Build Extension
        run: |
          # 1. Create a truly isolated workspace
          mkdir -p isolated_build
          
          # 2. Copy only the necessary files
          cp -r src/en/lgbtics isolated_build/
          cp -r core isolated_build/
          cp -r lib-multisrc isolated_build/
          
          # 3. Create settings and build files using cat to ensure double quotes
          cat <<EOF > isolated_build/settings.gradle.kts
          include(":lgbtics")
          EOF
          
          cat <<EOF > isolated_build/build.gradle.kts
          rootProject.name = "isolated-build"
          EOF
          
          # 4. Copy the gradlew wrapper
          cp gradlew isolated_build/
          cp -r gradle isolated_build/
          chmod +x isolated_build/gradlew
          
          # 5. Build from the isolated workspace
          cd isolated_build
          ./gradlew :lgbtics:assembleDebug \
            -x spotlessKotlinCheck \
            -x lintDebug \
            -x test \
            -x check
          
      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: lgbtics-extension-apk
          path: "isolated_build/lgbtics/build/outputs/apk/debug/*.apk"

name: Build My Custom Extension

on:
  workflow_dispatch: # Gives you a manual trigger button

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle (No Cache Mode)
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true # Bypasses the broken GitHub cache servers entirely

      - name: Build Specific Extension Only
        run: |
          chmod +x gradlew
          ./gradlew :src:en:lgbtics:assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: lgbtics-extension-apk
          path: "src/en/lgbtics/build/outputs/apk/debug/*.apk"

name: Build My Custom Extension

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # This tells GitHub to only download the folders required for your build
          sparse-checkout: |
            core
            gradle
            lib
            lib-multisrc
            src/en/lgbtics

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true 

      - name: Build Extension
        run: |
          chmod +x gradlew
          # We no longer need the 'echo include...' lines because 
          # the sparse checkout now provides the files.
          ./gradlew :src:en:lgbtics:spotlessApply
          ./gradlew :src:en:lgbtics:assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: lgbtics-extension-apk
          path: "src/en/lgbtics/build/outputs/apk/debug/*.apk"

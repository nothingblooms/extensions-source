name: Build My Custom Extension

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # This tells GitHub to only download the folders required for your build
          sparse-checkout: |
            common
            core
            gradle
            lib
            lib-multisrc
            src/en/lgbtics

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: true
          cache-write-only: false
          gradle-home-cache-cleanup: false
           

      - name: Build Extension
        run: |
         chmod +x gradlew
          # Specifically and ONLY build the debug APK for your extension.
          # We use '-x' to ensure we don't accidentally trigger any release-related tasks.
          ./gradlew :src:en:lgbtics:assembleDebug -x :src:en:lgbtics:assembleRelease

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: lgbtics-extension-apk
          path: "src/en/lgbtics/build/outputs/apk/debug/*.apk"

name: Build My Custom Extension

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            common
            core
            gradle
            lib
            lib-multisrc
            src/en/lgbtics

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: true
          cache-write-only: false
          gradle-home-cache-cleanup: false

      - name: Force Isolation
        run: |
          # This deletes every folder in src except your target extension
          # It prevents Gradle from finding and trying to build/sign other extensions
          find src -mindepth 2 -maxdepth 3 -not -path 'src/en/lgbtics*' -exec rm -rf {} +
          
          # Delete the signing key file so it cannot be used
          rm -f signingkey.jks

      - name: Build Extension
       run: |
         chmod +x gradlew
          
          # 1. Move your extension to a folder Gradle won't automatically scan
          mkdir -p my_extension
          cp -r src/en/lgbtics/* my_extension/
          
          # 2. Patch the dependency references in the build file
          # This replaces references to the 'root' projects with just local references
          sed -i 's/project(":lib-multisrc:/project("..\/..\/lib-multisrc:/g' my_extension/build.gradle.kts
          sed -i 's/project(":core")/project("..\/..\/core")/g' my_extension/build.gradle.kts
          
          # 3. Build it from the new location
          ./gradlew assembleDebug -p my_extension -x spotlessKotlinCheck
      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: lgbtics-extension-apk
          path: "src/en/lgbtics/build/outputs/apk/debug/*.apk"

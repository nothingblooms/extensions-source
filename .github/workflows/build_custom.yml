name: Build My Custom Extension

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            common
            core
            gradle
            lib
            lib-multisrc
            src/en/lgbtics

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: true
          cache-write-only: false
          gradle-home-cache-cleanup: false

      - name: Isolate Extension
        run: |
          # This deletes everything in 'src' EXCEPT your extension
          find src -mindepth 1 -maxdepth 3 -not -path 'src/en/lgbtics*' -exec rm -rf {} +

      - name: Build Extension
        run: |
          chmod +x gradlew
          # Now that other sources are gone, the build system can't see them
          ./gradlew :src:en:lgbtics:assembleDebug -x spotlessKotlinCheck

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: lgbtics-extension-apk
          path: "src/en/lgbtics/build/outputs/apk/debug/*.apk"

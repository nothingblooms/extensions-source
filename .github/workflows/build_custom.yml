name: Build My Custom Extension

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle (No Cache Mode)
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true

      - name: Auto-Format and Build Extension
        run: |
          chmod +x gradlew
          # Force Gradle to include the multi-source core dependency module
          echo 'include(":lib-multisrc:madara")' >> settings.gradle.kts || echo 'include(":lib-multisrc:madara")' >> settings.gradle
          
          ./gradlew :src:en:lgbtics:spotlessApply
          ./gradlew :src:en:lgbtics:assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: lgbtics-extension-apk
          path: "src/en/lgbtics/build/outputs/apk/debug/*.apk"

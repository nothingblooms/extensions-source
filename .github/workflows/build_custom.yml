name: Build My Custom Extension

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            common
            core
            gradle
            lib
            lib-multisrc

      - name: Setup Extension
        run: |
          mkdir -p src/en/lgbtics
          git sparse-checkout add src/en/lgbtics

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: true
          cache-write-only: false
          gradle-home-cache-cleanup: false

      - name: Build Extension
        run: |
          # Build only your extension and specifically exclude all signing tasks
          ./gradlew :src:en:lgbtics:assembleDebug \
            -x spotlessKotlinCheck \
            -x lintDebug \
            -x test \
            -x check \
            -x signRelease \
            -x packageRelease
          
      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: lgbtics-extension-apk
          path: "isolated_build/lgbtics/build/outputs/apk/debug/*.apk"

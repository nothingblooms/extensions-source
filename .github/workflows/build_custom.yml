name: Build My Custom Extension

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            common
            core
            gradle
            lib
            lib-multisrc

      - name: Setup Extension
        run: |
          mkdir -p src/en/lgbtics
          git sparse-checkout add src/en/lgbtics

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: true
          cache-write-only: false
          gradle-home-cache-cleanup: false

      - name: Build Extension
        run: |
          mkdir -p isolated_build
          cp -r src/en/lgbtics isolated_build/
          cp -r core isolated_build/
          cp -r lib-multisrc isolated_build/
          
          # Create a settings file that explicitly defines the project
          cat <<EOF > settings.gradle.kts
          rootProject.name = "isolated-build"
          include(":lgbtics")
          EOF
          
          # We don't actually need a build.gradle.kts in the root for a simple build,
          # but if we do, make it completely empty to avoid conflict.
          touch build.gradle.kts
          
          cp gradlew isolated_build/
          cp -r gradle isolated_build/
          chmod +x isolated_build/gradlew
          
          # Run gradle from the root, pointing specifically to the isolated build
          ./gradlew :lgbtics:assembleDebug -x spotlessKotlinCheck -x lintDebug -x test -x check
          
      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: lgbtics-extension-apk
          path: "isolated_build/lgbtics/build/outputs/apk/debug/*.apk"
